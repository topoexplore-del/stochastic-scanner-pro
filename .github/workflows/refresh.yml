name: Refresh Stochastic Snapshot

on:
  schedule:
    # Daily at 21:30 UTC (after US market close — 16:30 ET / 17:30 DST)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # allow manual run

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build snapshot
        run: python scripts/build_data.py --out-dir data --quiet

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          git diff --staged --quiet || git commit -m "Refresh snapshot $(date -u +%Y-%m-%d)"
          git push
